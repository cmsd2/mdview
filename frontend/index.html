<!doctype html>
<html lang="en" data-theme="light">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mdview</title>

    <!-- Swappable themes: href is changed at runtime by app.js -->
    <link id="md-theme" rel="stylesheet" href="vendor/github-markdown-light.css" />
    <link id="hljs-theme" rel="stylesheet" href="vendor/highlight/github.min.css" />
    <link rel="stylesheet" href="vendor/katex/katex.min.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="toolbar">
      <span class="title" id="doc-title">mdview</span>
      <div class="theme-switch" role="group" aria-label="Theme">
        <button type="button" data-theme-choice="light" title="Light theme">☀</button>
        <button type="button" data-theme-choice="dark" title="Dark theme">☾</button>
        <button type="button" data-theme-choice="system" title="Follow system">⚙</button>
      </div>
    </header>

    <main>
      <article class="markdown-body" id="content"></article>
    </main>

    <script src="vendor/highlight/highlight.min.js"></script>
    <script src="vendor/katex/katex.min.js"></script>
    <script src="app.js" defer></script>
  </body>
</html>
